<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Veterinario</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #34495e;
            color: white;
        }

        .btn-delete {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐾 Panel de Control Veterinario</h1>

        <form id="petForm">
            <div class="form-group">
                <input type="text" id="petName" placeholder="Nombre de la mascota" required>
                <select id="petType" required>
                    <option value="">Tipo de animal</option>
                    <option value="Perro">Perro</option>
                    <option value="Gato">Gato</option>
                    <option value="Ave">Ave</option>
                    <option value="Otro">Otro</option>
                </select>
                <input type="text" id="ownerName" placeholder="Nombre del dueño" required>
                <input type="text" id="reason" placeholder="Motivo de consulta" required>
                <button type="submit">Registrar Paciente</button>
            </div>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Mascota</th>
                    <th>Tipo</th>
                    <th>Dueño</th>
                    <th>Motivo</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="petList">
                </tbody>
        </table>
    </div>

    <script>
        const form = document.getElementById('petForm');
        const petList = document.getElementById('petList');

        let patients = JSON.parse(localStorage.getItem('patients')) || [];

        function renderPatients() {
            petList.innerHTML = '';
            patients.forEach((patient, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${patient.petName}</td>
                    <td>${patient.petType}</td>
                    <td>${patient.ownerName}</td>
                    <td>${patient.reason}</td>
                    <td><button class="btn-delete" onclick="deletePatient(${index})">Eliminar</button></td>
                `;
                petList.appendChild(row);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newPatient = {
                petName: document.getElementById('petName').value,
                petType: document.getElementById('petType').value,
                ownerName: document.getElementById('ownerName').value,
                reason: document.getElementById('reason').value
            };

            patients.push(newPatient);
            localStorage.setItem('patients', JSON.stringify(patients));
            renderPatients();
            form.reset();
        });

        function deletePatient(index) {
            patients.splice(index, 1);
            localStorage.setItem('patients', JSON.stringify(patients));
            renderPatients();
        }

        renderPatients();
    </script>
</body>
</html>
